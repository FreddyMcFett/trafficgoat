{% extends "base.html" %}
{% block title %}Logs{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0"><i class="bi bi-terminal"></i> Live Logs</h3>
    <div>
        <button class="btn btn-outline-secondary btn-sm" id="btn-clear-logs">
            <i class="bi bi-trash"></i> Clear
        </button>
        <button class="btn btn-outline-info btn-sm" id="btn-autoscroll" data-active="true">
            <i class="bi bi-arrow-down-circle"></i> Auto-scroll: ON
        </button>
    </div>
</div>

<div class="card bg-dark border-secondary">
    <div class="card-body p-2">
        <div id="full-log" class="log-container" style="height: calc(100vh - 200px); overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.85rem;">
            <div class="text-muted p-3">Waiting for log messages...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const logEl = document.getElementById('full-log');
    const clearBtn = document.getElementById('btn-clear-logs');
    const scrollBtn = document.getElementById('btn-autoscroll');
    let autoScroll = true;

    clearBtn.addEventListener('click', function() {
        logEl.innerHTML = '<div class="text-muted p-3">Logs cleared.</div>';
    });

    scrollBtn.addEventListener('click', function() {
        autoScroll = !autoScroll;
        scrollBtn.innerHTML = autoScroll
            ? '<i class="bi bi-arrow-down-circle"></i> Auto-scroll: ON'
            : '<i class="bi bi-arrow-down-circle"></i> Auto-scroll: OFF';
        scrollBtn.className = autoScroll
            ? 'btn btn-outline-info btn-sm'
            : 'btn btn-outline-secondary btn-sm';
    });

    // Override the global log handler for this page
    if (window.trafficGoat && window.trafficGoat.socket) {
        window.trafficGoat.socket.on('log_message', function(data) {
            if (logEl.querySelector('.text-muted')) {
                logEl.innerHTML = '';
            }
            const line = document.createElement('div');
            line.className = 'log-line px-2 py-0';
            line.textContent = data.message;

            // Color coding
            if (data.message.includes('Error') || data.message.includes('error')) {
                line.classList.add('text-danger');
            } else if (data.message.includes('Starting') || data.message.includes('started')) {
                line.classList.add('text-success');
            } else if (data.message.includes('Stopped') || data.message.includes('stopping')) {
                line.classList.add('text-warning');
            }

            logEl.appendChild(line);

            // Keep max 500 lines
            while (logEl.children.length > 500) {
                logEl.removeChild(logEl.firstChild);
            }

            if (autoScroll) {
                logEl.scrollTop = logEl.scrollHeight;
            }
        });
    }

    // Load existing logs
    fetch('/api/logs?n=200')
        .then(r => r.json())
        .then(data => {
            if (data.logs && data.logs.length > 0) {
                logEl.innerHTML = '';
                data.logs.forEach(function(msg) {
                    const line = document.createElement('div');
                    line.className = 'log-line px-2 py-0';
                    line.textContent = msg;
                    logEl.appendChild(line);
                });
                if (autoScroll) logEl.scrollTop = logEl.scrollHeight;
            }
        });
});
</script>
{% endblock %}
