<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrafficGoat - {% block title %}Dashboard{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Top Header Bar -->
    <header class="forti-header">
        <div class="forti-header-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
                <i class="bi bi-list"></i>
            </button>
            <div class="forti-brand">
                <img src="{{ url_for('static', filename='img/favicon.svg') }}" alt="TrafficGoat" class="forti-brand-logo">
                <span class="forti-brand-text">TrafficGoat</span>
            </div>
            <div class="forti-breadcrumb">
                <i class="bi bi-chevron-right"></i>
                <span id="page-title">{% block header_title %}Dashboard{% endblock %}</span>
            </div>
        </div>
        <div class="forti-header-right">
            <div class="forti-header-status" id="header-engine-status">
                <span class="status-dot idle"></span>
                <span class="status-text">Idle</span>
            </div>
            <div class="forti-header-info">
                <i class="bi bi-clock"></i>
                <span id="header-uptime">00:00:00</span>
            </div>
            <div class="forti-header-user">
                <i class="bi bi-person-circle"></i>
                <span>admin</span>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav class="forti-sidebar" id="sidebar">
        <div class="sidebar-section-label">Monitor</div>
        <a href="/" class="sidebar-link {% if request.path == '/' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="/logs" class="sidebar-link {% if request.path == '/logs' %}active{% endif %}">
            <i class="bi bi-journal-text"></i>
            <span>Log Viewer</span>
        </a>

        <div class="sidebar-section-label">Network</div>
        <a href="/generate" class="sidebar-link {% if request.path == '/generate' %}active{% endif %}">
            <i class="bi bi-send-fill"></i>
            <span>Traffic Generation</span>
        </a>

        <div class="sidebar-footer">
            <div class="sidebar-version">
                <img src="{{ url_for('static', filename='img/favicon.svg') }}" alt="" class="sidebar-version-logo">
                TrafficGoat v{{ app_version }}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="forti-content" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
