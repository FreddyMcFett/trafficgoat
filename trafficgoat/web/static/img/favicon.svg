<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4b8bf5"/>
      <stop offset="100%" style="stop-color:#2ac7c7"/>
    </linearGradient>
    <linearGradient id="horn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb830"/>
      <stop offset="100%" style="stop-color:#f5503b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Left horn -->
  <path d="M20 22 C17 15, 14 10, 12 7 C14 8, 18 13, 22 20" fill="url(#horn)" stroke="#e8960a" stroke-width="0.8"/>
  <!-- Right horn -->
  <path d="M44 22 C47 15, 50 10, 52 7 C50 8, 46 13, 42 20" fill="url(#horn)" stroke="#e8960a" stroke-width="0.8"/>

  <!-- Head -->
  <path d="M32 52 C24 52, 17 46, 16 40 C14 34, 16 28, 20 24
           C23 21, 27 19, 30 18.5 C31 18.3, 32 18.2, 32 18.2
           C32 18.2, 33 18.3, 34 18.5 C37 19, 41 21, 44 24
           C48 28, 50 34, 48 40 C47 46, 40 52, 32 52Z"
        fill="#f0f2f5" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>

  <!-- Left ear -->
  <path d="M18 27 C14 24, 12 22, 11 25 C10 28, 14 29, 17 28Z" fill="#e0d5d0"/>
  <!-- Right ear -->
  <path d="M46 27 C50 24, 52 22, 53 25 C54 28, 50 29, 47 28Z" fill="#e0d5d0"/>

  <!-- Eyes -->
  <ellipse cx="26" cy="31" rx="3.5" ry="3.8" fill="#222838"/>
  <ellipse cx="27" cy="30" rx="1.3" ry="1.5" fill="#4b8bf5"/>
  <ellipse cx="27.5" cy="29.5" rx="0.6" ry="0.6" fill="#fff"/>

  <ellipse cx="38" cy="31" rx="3.5" ry="3.8" fill="#222838"/>
  <ellipse cx="39" cy="30" rx="1.3" ry="1.5" fill="#4b8bf5"/>
  <ellipse cx="39.5" cy="29.5" rx="0.6" ry="0.6" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="5" ry="3.5" fill="#d4b8a8"/>
  <ellipse cx="30" cy="39.8" rx="1" ry="1.3" fill="#a08878"/>
  <ellipse cx="34" cy="39.8" rx="1" ry="1.3" fill="#a08878"/>

  <!-- Mouth -->
  <path d="M29.5 43 Q32 45, 34.5 43" fill="none" stroke="#a08878" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Goatee -->
  <path d="M30 44.5 C29 48, 31 53, 32 55 C33 53, 35 48, 34 44.5" fill="#d0ccc8"/>

  <!-- Signal waves -->
  <g fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round">
    <path d="M50 24 C53 21, 53 16, 50 13"/>
    <path d="M54 27 C58 22, 58 13, 54 8"/>
  </g>
</svg>
