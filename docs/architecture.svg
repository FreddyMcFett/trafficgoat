<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a2647;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" rx="12" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <rect x="20" y="15" width="860" height="50" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="450" y="47" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">TrafficGoat — Architecture</text>

  <!-- CLI Interface box -->
  <rect x="40" y="90" width="200" height="110" rx="8" fill="#1a1a40" stroke="#533483" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="200" height="28" rx="8" fill="#533483"/>
  <rect x="40" y="108" width="200" height="10" fill="#533483"/>
  <text x="140" y="110" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">CLI Interface</text>
  <text x="140" y="138" text-anchor="middle" fill="#b8b8d0" font-size="12">(argparse)</text>
  <text x="140" y="158" text-anchor="middle" fill="#8be9fd" font-size="11">trafficgoat</text>
  <text x="140" y="176" text-anchor="middle" fill="#8be9fd" font-size="11">auto / stress / scan / ...</text>

  <!-- Web UI box -->
  <rect x="280" y="90" width="350" height="110" rx="8" fill="#1a1a40" stroke="#533483" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="90" width="350" height="28" rx="8" fill="#533483"/>
  <rect x="280" y="108" width="350" height="10" fill="#533483"/>
  <text x="455" y="110" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Web UI (Flask)</text>

  <!-- REST API sub-box -->
  <rect x="300" y="130" width="130" height="50" rx="6" fill="#0f3460" stroke="#1a6fb5" stroke-width="1.5"/>
  <text x="365" y="152" text-anchor="middle" fill="#50fa7b" font-size="12" font-weight="bold">REST API</text>
  <text x="365" y="170" text-anchor="middle" fill="#8be9fd" font-size="11">/api/*</text>

  <!-- Socket.IO sub-box -->
  <rect x="450" y="130" width="160" height="50" rx="6" fill="#0f3460" stroke="#1a6fb5" stroke-width="1.5"/>
  <text x="530" y="152" text-anchor="middle" fill="#50fa7b" font-size="12" font-weight="bold">Socket.IO</text>
  <text x="530" y="170" text-anchor="middle" fill="#8be9fd" font-size="11">(real-time)</text>

  <!-- StatsCollector box -->
  <rect x="680" y="90" width="190" height="200" rx="8" fill="#1a1a40" stroke="#e94560" stroke-width="2" filter="url(#shadow)"/>
  <rect x="680" y="90" width="190" height="28" rx="8" fill="#e94560"/>
  <rect x="680" y="108" width="190" height="10" fill="#e94560"/>
  <text x="775" y="110" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">StatsCollector</text>
  <text x="775" y="142" text-anchor="middle" fill="#b8b8d0" font-size="11">Thread-safe locks</text>
  <text x="775" y="162" text-anchor="middle" fill="#b8b8d0" font-size="11">Per-generator</text>
  <text x="775" y="180" text-anchor="middle" fill="#b8b8d0" font-size="11">aggregation</text>
  <text x="775" y="200" text-anchor="middle" fill="#b8b8d0" font-size="11">1s emit loop</text>
  <text x="775" y="220" text-anchor="middle" fill="#b8b8d0" font-size="11">Log broadcasting</text>

  <!-- Arrows from CLI and Web UI down -->
  <line x1="140" y1="200" x2="140" y2="240" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="365" y1="200" x2="365" y2="240" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Arrow from Socket.IO to StatsCollector -->
  <line x1="610" y1="155" x2="680" y2="155" stroke="#50fa7b" stroke-width="2" marker-start="url(#arrowGreenRev)"/>

  <!-- TrafficEngine box -->
  <rect x="40" y="240" width="600" height="330" rx="8" fill="url(#engineGrad)" stroke="#1a6fb5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="240" width="600" height="28" rx="8" fill="#1a6fb5"/>
  <rect x="40" y="258" width="600" height="10" fill="#1a6fb5"/>
  <text x="340" y="260" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">TrafficEngine</text>

  <!-- Mode Layer box -->
  <rect x="65" y="282" width="550" height="60" rx="6" fill="#162447" stroke="#533483" stroke-width="1.5"/>
  <text x="340" y="304" text-anchor="middle" fill="#ff79c6" font-size="13" font-weight="bold">Mode Layer</text>
  <text x="340" y="324" text-anchor="middle" fill="#8be9fd" font-size="11">auto | stress | scan | mixed | protocol | stealth | custom</text>
  <text x="340" y="338" text-anchor="middle" fill="#b8b8d0" font-size="10">configure(config, engine)</text>

  <!-- Arrow Mode to Generators -->
  <line x1="340" y1="342" x2="340" y2="365" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Generator Threads box -->
  <rect x="65" y="365" width="550" height="185" rx="6" fill="#162447" stroke="#533483" stroke-width="1.5"/>
  <text x="340" y="388" text-anchor="middle" fill="#ff79c6" font-size="13" font-weight="bold">Generator Threads</text>

  <!-- Generator boxes - row 1 -->
  <rect x="85" y="400" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="142" y="423" text-anchor="middle" fill="#50fa7b" font-size="12">TCP / SYN</text>

  <rect x="215" y="400" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="272" y="423" text-anchor="middle" fill="#50fa7b" font-size="12">UDP</text>

  <rect x="345" y="400" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="402" y="423" text-anchor="middle" fill="#50fa7b" font-size="12">ICMP</text>

  <rect x="475" y="400" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="532" y="423" text-anchor="middle" fill="#50fa7b" font-size="12">HTTP</text>

  <!-- Generator boxes - row 2 -->
  <rect x="85" y="448" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="142" y="471" text-anchor="middle" fill="#50fa7b" font-size="12">DNS</text>

  <rect x="215" y="448" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="272" y="471" text-anchor="middle" fill="#50fa7b" font-size="12">Bulk</text>

  <rect x="345" y="448" width="115" height="36" rx="5" fill="#0f3460" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="402" y="471" text-anchor="middle" fill="#50fa7b" font-size="12">App / FTP</text>

  <rect x="475" y="448" width="115" height="36" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="532" y="471" text-anchor="middle" fill="#e94560" font-size="12">Malicious</text>

  <!-- stats.update() arrow from generators to StatsCollector -->
  <path d="M 615 450 L 660 450 L 660 250 L 775 250 L 775 290" stroke="#ffb86c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="660" y="345" fill="#ffb86c" font-size="11" transform="rotate(-90, 660, 345)">stats.update()</text>

  <!-- Network layer -->
  <rect x="40" y="600" width="600" height="55" rx="8" fill="#1a1a40" stroke="#e94560" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="600" width="600" height="28" rx="8" fill="#c23152"/>
  <rect x="40" y="618" width="600" height="10" fill="#c23152"/>
  <text x="340" y="620" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Network (Scapy / Sockets)</text>
  <text x="340" y="644" text-anchor="middle" fill="#8be9fd" font-size="12">Raw packets  |  HTTP requests  |  TCP connections</text>

  <!-- Arrow Engine to Network -->
  <line x1="340" y1="570" x2="340" y2="600" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Data flow label -->
  <rect x="40" y="675" width="830" height="32" rx="6" fill="#162447" stroke="#533483" stroke-width="1"/>
  <text x="450" y="696" text-anchor="middle" fill="#b8b8d0" font-size="11">
    Data Flow:  User Input → Mode.configure() → Engine.add_generator() → Generator.generate() → stats.update() → StatsCollector → Socket.IO → Dashboard
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowGreenRev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#50fa7b"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb86c"/>
    </marker>
  </defs>
</svg>